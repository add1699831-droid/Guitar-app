<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="木吉他和弦查詢器（MVP）：Major / Minor / 7 / m7 / sus2 / sus4。" />
  <title>Acoustic Guitar Chords</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="layout">
    <header class="hero">
      <p class="eyebrow">Acoustic Guitar</p>
      <h1>木吉他和弦查詢</h1>
      <p class="hero-sub">極簡清爽風：只顯示已驗證按法，其他先顯示組成音。</p>
    </header>

    <section class="app">
      <aside class="panel">
        <label for="chordSelect">選擇和弦</label>
        <select id="chordSelect"></select>
        <ul class="legend">
          <li><span class="dot-legend">1</span> 建議手指</li>
          <li><span class="open-legend">O</span> 空弦</li>
          <li><span class="mute-legend">X</span> 悶音</li>
        </ul>
      </aside>

      <article class="card" aria-live="polite">
        <header class="card-header">
          <div>
            <h2 id="chordName"></h2>
            <p id="chordInfo" class="muted"></p>
          </div>
          <span id="statusBadge" class="badge"></span>
        </header>

        <div class="card-body">
          <section class="info-col">
            <div class="box">
              <h3>組成音</h3>
              <ul id="notes" class="chips"></ul>
            </div>
            <div class="box">
              <h3>音程</h3>
              <ul id="intervals" class="chips"></ul>
            </div>
            <div class="box">
              <h3>六線按法</h3>
              <p id="fingering" class="fingering">-</p>
            </div>
            <div class="box">
              <h3>練習提示</h3>
              <p id="tip" class="muted"></p>
            </div>
          </section>

          <section>
            <div class="strings"><span>E</span><span>A</span><span>D</span><span>G</span><span>B</span><span>e</span></div>
            <div id="diagramArea"></div>
          </section>
        </div>
      </article>
    </section>
  </main>

  <script src="chord-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
