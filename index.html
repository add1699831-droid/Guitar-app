<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>和弦指南</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f3ec;
        --ink: #202022;
        --muted: #68645d;
        --line: rgba(32, 32, 34, 0.14);
        --paper: #fffdf8;
        --paper-2: #f8efe4;
        --root: #d84f3d;
        --third: #24706f;
        --fifth: #2f5aa8;
        --seventh: #8b4aa7;
        --accent: #e2aa42;
        --shadow: 0 18px 45px rgba(51, 43, 32, 0.16);
        --radius: 8px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.86), rgba(255, 255, 255, 0.4)),
          repeating-linear-gradient(90deg, rgba(32, 32, 34, 0.035) 0 1px, transparent 1px 28px),
          var(--bg);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          "Noto Sans TC", sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .app-shell {
        min-height: 100vh;
      }

      .top-band {
        background: #232323;
        color: #fffdf8;
        border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      }

      .hero {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0 22px;
        display: grid;
        grid-template-columns: minmax(0, 1.25fr) minmax(300px, 0.75fr);
        gap: 28px;
        align-items: end;
      }

      .eyebrow {
        color: #f1c86d;
        font-size: 0.78rem;
        letter-spacing: 0;
        text-transform: uppercase;
        margin: 0 0 10px;
      }

      h1 {
        margin: 0;
        max-width: 780px;
        font-size: clamp(2.1rem, 4.6vw, 5rem);
        line-height: 0.98;
        letter-spacing: 0;
      }

      .hero-copy {
        margin: 18px 0 0;
        max-width: 650px;
        color: rgba(255, 253, 248, 0.76);
        font-size: 1.05rem;
        line-height: 1.7;
      }

      .stats-strip {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1px;
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: var(--radius);
        overflow: hidden;
      }

      .stat {
        padding: 16px 14px;
        background: rgba(255, 255, 255, 0.07);
      }

      .stat strong {
        display: block;
        font-size: 1.5rem;
        line-height: 1;
      }

      .stat span {
        display: block;
        margin-top: 8px;
        color: rgba(255, 253, 248, 0.66);
        font-size: 0.85rem;
      }

      .control-band {
        position: sticky;
        top: 0;
        z-index: 20;
        border-bottom: 1px solid var(--line);
        background: rgba(246, 243, 236, 0.9);
        backdrop-filter: blur(18px);
      }

      .controls {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 14px 0;
        display: grid;
        grid-template-columns: minmax(240px, 1fr) auto;
        gap: 14px;
        align-items: center;
      }

      .search-field {
        position: relative;
      }

      .search-icon {
        position: absolute;
        left: 14px;
        top: 50%;
        width: 19px;
        height: 19px;
        transform: translateY(-50%);
        color: #77716a;
        pointer-events: none;
      }

      .search-input {
        width: 100%;
        min-height: 48px;
        padding: 0 44px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper);
        color: var(--ink);
        outline: none;
        box-shadow: 0 8px 24px rgba(51, 43, 32, 0.08);
      }

      .search-input:focus {
        border-color: rgba(216, 79, 61, 0.55);
        box-shadow: 0 0 0 4px rgba(216, 79, 61, 0.12);
      }

      .clear-search {
        position: absolute;
        right: 8px;
        top: 50%;
        width: 34px;
        height: 34px;
        border: 0;
        border-radius: 50%;
        background: transparent;
        color: #68645d;
        transform: translateY(-50%);
        display: grid;
        place-items: center;
      }

      .clear-search:hover {
        background: rgba(32, 32, 34, 0.08);
      }

      .filter-tabs {
        display: inline-grid;
        grid-auto-flow: column;
        gap: 6px;
        padding: 5px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: rgba(255, 253, 248, 0.72);
      }

      .filter-tab {
        min-height: 38px;
        padding: 0 14px;
        border: 0;
        border-radius: 6px;
        background: transparent;
        color: var(--muted);
        white-space: nowrap;
      }

      .filter-tab.is-active {
        background: #202022;
        color: #fffdf8;
      }

      main {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 24px 0 54px;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        margin-bottom: 18px;
      }

      .result-count {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }

      .mobile-hint {
        display: none;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .scroll-actions {
        display: none;
        gap: 8px;
      }

      .icon-button {
        width: 42px;
        height: 42px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper);
        color: var(--ink);
        display: grid;
        place-items: center;
        box-shadow: 0 10px 22px rgba(51, 43, 32, 0.08);
      }

      .icon-button:hover {
        transform: translateY(-1px);
      }

      .chord-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
      }

      .chord-card {
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper);
        box-shadow: 0 12px 30px rgba(51, 43, 32, 0.1);
        overflow: hidden;
      }

      .chord-card.is-featured {
        outline: 3px solid rgba(226, 170, 66, 0.28);
      }

      .card-top {
        padding: 18px 18px 14px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: start;
        border-bottom: 1px solid var(--line);
        background:
          linear-gradient(180deg, rgba(248, 239, 228, 0.85), rgba(255, 253, 248, 0.9)),
          var(--paper-2);
      }

      .chord-title {
        margin: 0;
        font-size: 1.7rem;
        line-height: 1;
      }

      .chord-subtitle {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .category-pill {
        align-self: start;
        padding: 7px 9px;
        border-radius: 999px;
        background: #202022;
        color: #fffdf8;
        font-size: 0.78rem;
        white-space: nowrap;
      }

      .card-body {
        padding: 16px 18px 18px;
      }

      .diagram-wrap {
        display: grid;
        grid-template-columns: minmax(160px, 1fr) minmax(130px, 0.72fr);
        gap: 14px;
        align-items: start;
      }

      .fretboard {
        position: relative;
        margin-left: 16px;
        height: 240px;
        min-width: 160px;
        border-radius: var(--radius);
        background:
          linear-gradient(90deg, transparent 0 7%, rgba(32, 32, 34, 0.24) 7.4% 7.8%, transparent 8.2% 25%, rgba(32, 32, 34, 0.24) 25.4% 25.8%, transparent 26.2% 43%, rgba(32, 32, 34, 0.24) 43.4% 43.8%, transparent 44.2% 61%, rgba(32, 32, 34, 0.24) 61.4% 61.8%, transparent 62.2% 79%, rgba(32, 32, 34, 0.24) 79.4% 79.8%, transparent 80.2% 97%, rgba(32, 32, 34, 0.24) 97.4% 97.8%, transparent 98.2%),
          linear-gradient(180deg, rgba(32, 32, 34, 0.76) 0 14px, transparent 14px),
          linear-gradient(180deg, transparent 0 53px, rgba(32, 32, 34, 0.78) 53px 57px, transparent 57px),
          repeating-linear-gradient(180deg, transparent 57px 96px, rgba(32, 32, 34, 0.18) 97px 98px),
          #fdf6eb;
        border: 1px solid rgba(32, 32, 34, 0.16);
      }

      .base-fret {
        position: absolute;
        left: -24px;      /* 往左移出格子，推到你畫紅圈的位置 */
        top: 51px;        /* 微調高度，讓它剛好對齊上方那條粗黑線 */
        color: var(--ink); /* 加深顏色讓它更清楚 */
        font-size: 0.85rem; /* 字體稍微放大 */
        font-weight: 700;   /* 字體加粗 */
      }

      .string-state {
        position: absolute;
        top: 5px;
        width: 28px;
        height: 28px;
        transform: translateX(-50%);
        display: grid;
        place-items: center;
        border-radius: 50%;
        border: 2px solid currentColor;
        background: #fffdf8;
        color: #202022;
        font-size: 0.92rem;
        font-weight: 900;
        line-height: 1;
        box-shadow: 0 5px 12px rgba(32, 32, 34, 0.18);
        z-index: 4;
      }

      .string-state.is-open {
        color: #24706f;
      }

      .string-state.is-muted {
        color: #d84f3d;
      }

      .open-note {
        position: absolute;
        top: 34px;
        min-width: 34px;
        min-height: 22px;
        padding: 3px 5px;
        transform: translateX(-50%);
        border-radius: 999px;
        display: grid;
        place-items: center;
        background: rgba(47, 90, 168, 0.12);
        color: #263d73;
        border: 1px solid rgba(47, 90, 168, 0.24);
        font-size: 0.66rem;
        line-height: 1;
        font-weight: 800;
        z-index: 3;
      }

      .open-note[data-degree="1"] {
        background: rgba(216, 79, 61, 0.14);
        color: #a13428;
        border-color: rgba(216, 79, 61, 0.28);
      }

      .open-note[data-degree="3"],
      .open-note[data-degree="b3"] {
        background: rgba(36, 112, 111, 0.13);
        color: #1f5d5c;
        border-color: rgba(36, 112, 111, 0.28);
      }

      .open-note[data-degree="b7"],
      .open-note[data-degree="7"] {
        background: rgba(139, 74, 167, 0.13);
        color: #713987;
        border-color: rgba(139, 74, 167, 0.28);
      }

      .note-dot {
        position: absolute;
        width: 42px;
        height: 42px;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: var(--fifth);
        color: #fff;
        box-shadow: 0 10px 18px rgba(32, 32, 34, 0.23);
      }

      .note-dot[data-degree="1"] {
        background: var(--root);
      }

      .note-dot[data-degree="3"],
      .note-dot[data-degree="b3"] {
        background: var(--third);
      }

      .note-dot[data-degree="b7"],
      .note-dot[data-degree="7"] {
        background: var(--seventh);
      }

      .note-dot .note {
        display: block;
        font-size: 0.82rem;
        font-weight: 800;
        line-height: 1;
      }

      .note-dot .degree {
        display: block;
        margin-top: 2px;
        font-size: 0.68rem;
        line-height: 1;
        opacity: 0.9;
      }

      .side-panel {
        display: grid;
        gap: 12px;
      }

      .emotion-panel {
        margin-bottom: 14px;
        padding: 12px;
        border: 1px solid rgba(32, 32, 34, 0.12);
        border-radius: var(--radius);
        background:
          linear-gradient(135deg, rgba(226, 170, 66, 0.14), rgba(36, 112, 111, 0.08)),
          #fffaf1;
      }

      .emotion-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 9px;
      }

      .emotion-title {
        margin: 0;
        color: var(--ink);
        font-size: 0.86rem;
        font-weight: 800;
      }

      .emotion-meter {
        display: inline-flex;
        gap: 3px;
        align-items: center;
        color: var(--muted);
        font-size: 0.72rem;
        white-space: nowrap;
      }

      .meter-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: rgba(32, 32, 34, 0.18);
      }

      .meter-dot.is-filled {
        background: var(--root);
      }

      .emotion-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 8px;
      }

      .emotion-tag {
        min-height: 26px;
        padding: 4px 8px;
        border-radius: 999px;
        background: rgba(255, 253, 248, 0.88);
        color: #3f3a34;
        border: 1px solid rgba(32, 32, 34, 0.1);
        font-size: 0.78rem;
      }

      .emotion-copy {
        margin: 0;
        color: #514b44;
        font-size: 0.86rem;
        line-height: 1.6;
      }

      .info-block {
        border-left: 3px solid rgba(32, 32, 34, 0.18);
        padding-left: 10px;
      }

      .info-label {
        margin: 0 0 7px;
        color: var(--muted);
        font-size: 0.78rem;
      }

      .tone-list,
      .root-list,
      .next-list {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
      }

      .tone-chip,
      .root-chip,
      .next-chip {
        border: 1px solid rgba(32, 32, 34, 0.12);
        border-radius: 999px;
        background: #fffaf1;
        color: var(--ink);
        min-height: 30px;
        padding: 5px 9px;
        font-size: 0.82rem;
        line-height: 1.2;
      }

      .tone-chip strong {
        color: var(--root);
      }

      .next-chip {
        border-color: rgba(216, 79, 61, 0.22);
        background: rgba(216, 79, 61, 0.08);
      }

      .next-chip:hover {
        background: rgba(216, 79, 61, 0.16);
      }

      .voicing {
        margin: 14px 0 0;
        display: flex;
        gap: 8px;
        align-items: center;
        color: var(--muted);
        font-size: 0.86rem;
      }

      .voicing code {
        color: var(--ink);
        background: rgba(32, 32, 34, 0.07);
        border-radius: 5px;
        padding: 3px 6px;
      }

      .empty-state {
        width: 100%;
        padding: 44px 20px;
        border: 1px dashed rgba(32, 32, 34, 0.22);
        border-radius: var(--radius);
        background: rgba(255, 253, 248, 0.72);
        text-align: center;
      }

      .empty-state h2 {
        margin: 0;
        font-size: 1.35rem;
      }

      .empty-state p {
        margin: 10px auto 0;
        max-width: 420px;
        color: var(--muted);
        line-height: 1.7;
      }

      @media (max-width: 980px) {
        .hero {
          grid-template-columns: 1fr;
        }

        .chord-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 720px) {
        body {
          background:
            linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.52)),
            repeating-linear-gradient(90deg, rgba(32, 32, 34, 0.04) 0 1px, transparent 1px 22px),
            var(--bg);
        }

        .hero {
          width: min(100% - 24px, 1180px);
          padding: 24px 0 18px;
          gap: 20px;
        }

        h1 {
          font-size: clamp(2.3rem, 15vw, 4.2rem);
        }

        .hero-copy {
          font-size: 0.98rem;
        }

        .stats-strip {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .stat {
          padding: 12px 10px;
        }

        .stat strong {
          font-size: 1.2rem;
        }

        .controls {
          width: min(100% - 24px, 1180px);
          grid-template-columns: 1fr;
          gap: 10px;
        }

        .filter-tabs {
          display: flex;
          overflow-x: auto;
          scrollbar-width: none;
        }

        .filter-tabs::-webkit-scrollbar {
          display: none;
        }

        .filter-tab {
          flex: 0 0 auto;
          min-width: 86px;
        }

        main {
          width: 100%;
          padding: 20px 0 42px;
        }

        .toolbar {
          width: min(100% - 24px, 1180px);
          margin: 0 auto 12px;
        }

        .mobile-hint,
        .scroll-actions {
          display: flex;
          align-items: center;
        }

        .result-count {
          display: none;
        }

        .chord-grid {
          display: flex;
          gap: 12px;
          overflow-x: auto;
          padding: 2px 12px 18px;
          scroll-snap-type: x mandatory;
          scroll-padding-inline: 12px;
          -webkit-overflow-scrolling: touch;
          cursor: grab;
        }

        .chord-grid.is-dragging {
          cursor: grabbing;
          scroll-snap-type: none;
        }

        .chord-grid::-webkit-scrollbar {
          height: 8px;
        }

        .chord-grid::-webkit-scrollbar-thumb {
          background: rgba(32, 32, 34, 0.2);
          border-radius: 999px;
        }

        .chord-card {
          flex: 0 0 min(88vw, 390px);
          scroll-snap-align: start;
        }

        .diagram-wrap {
          grid-template-columns: 1fr;
        }

        .fretboard {
          height: 260px;
        }

        .note-dot {
          width: 46px;
          height: 46px;
        }
      }

      @media (max-width: 420px) {
        .card-top,
        .card-body {
          padding-left: 14px;
          padding-right: 14px;
        }

        .stats-strip {
          grid-template-columns: 1fr;
        }

        .toolbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .scroll-actions {
          width: 100%;
          justify-content: flex-end;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="top-band">
        <section class="hero" aria-labelledby="page-title">
          <div>
            <p class="eyebrow">Guitar Chord</p>
            <h1 id="page-title">和弦一看就懂</h1>
            <p class="hero-copy">
              根音位置、音名與常見接法都集中在一張圖裡。從開放和弦到封閉和弦，練習時不用在多個表格之間來回跳。
            </p>
          </div>
          <div class="stats-strip" aria-label="和弦資料摘要">
            <div class="stat">
              <strong id="stat-total">0</strong>
              <span>可查和弦</span>
            </div>
            <div class="stat">
              <strong>C E G</strong>
              <span>音名標示</span>
            </div>
            <div class="stat">
              <strong>bB</strong>
              <span>七和弦辨識</span>
            </div>
          </div>
        </section>
      </header>

      <section class="control-band" aria-label="搜尋與篩選">
        <div class="controls">
          <div class="search-selectors" style="display: flex; gap: 12px; width: 100%;">
            <select id="rootSelect" class="search-input" style="padding: 0 14px; margin: 0; min-width: 120px; width: auto; cursor: pointer;">
              <option value="all">全部根音</option>
              <option value="C">C</option>
              <option value="Db">Db / C#</option>
              <option value="D">D</option>
              <option value="Eb">Eb / D#</option>
              <option value="E">E</option>
              <option value="F">F</option>
              <option value="Gb">Gb / F#</option>
              <option value="G">G</option>
              <option value="Ab">Ab / G#</option>
              <option value="A">A</option>
              <option value="Bb">Bb / A#</option>
              <option value="B">B</option>
            </select>

            <select id="qualitySelect" class="search-input" style="padding: 0 14px; margin: 0; flex: 1; cursor: pointer;">
              <option value="all">全部和弦類型</option>
              <option value="major">大和弦 (Major)</option>
              <option value="m">小和弦 (m)</option>
              <option value="7">屬七和弦 (7)</option>
              <option value="m7">小七和弦 (m7)</option>
              <option value="Maj7">大七和弦 (Maj7)</option>
              <option value="sus4">掛留四 (sus4)</option>
              <option value="sus2">掛留二 (sus2)</option>
              <option value="7sus4">屬七掛四 (7sus4)</option>
              <option value="dim">減和弦 (dim)</option>
              <option value="dim7">減七和弦 (dim7)</option>
              <option value="m7b5">半減七和弦 (m7b5)</option>
              <option value="add9">加九和弦 (add9)</option>
              <option value="5">五度和弦 (Power Chord)</option>
            </select>
          </div>
        </div>
      </section>

      <main>
        <div class="toolbar">
          <p class="result-count" id="result-count">顯示所有和弦</p>
          <span class="mobile-hint">左右滑動瀏覽和弦</span>
          <div class="scroll-actions" aria-label="行動版滑動控制">
            <button class="icon-button" id="prev-card" type="button" aria-label="上一個和弦">
              <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  fill="none"
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="m15 18-6-6 6-6"
                />
              </svg>
            </button>
            <button class="icon-button" id="next-card" type="button" aria-label="下一個和弦">
              <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  fill="none"
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="m9 18 6-6-6-6"
                />
              </svg>
            </button>
          </div>
        </div>

        <section class="chord-grid" id="chord-grid" aria-live="polite"></section>
      </main>
    </div>

          }

          const note = noteAt(stringIndex, fret);
          const degree = map.get(noteIndex(note)) ?? "?";
          const row = Math.max(1, Math.min(displayFrets, fret - chord.baseFret + 1));
          const dot = document.createElement("span");
          dot.className = "note-dot";
          dot.dataset.degree = degree;
          dot.style.left = `${stringX[stringIndex]}%`;
          dot.style.top = `${usableTop + (row - 0.5) * (usableHeight / displayFrets)}px`;
          dot.title = `${STRING_NAMES[stringIndex]} ${fret}格：${note} 是 ${degree}`;
          dot.innerHTML = `<span class="note">${note}</span>`;
          fretboard.appendChild(dot);
        });
      }

      function renderCard(chord) {
        const fragment = template.content.cloneNode(true);
        const card = fragment.querySelector(".chord-card");
        const title = fragment.querySelector(".chord-title");
        const subtitle = fragment.querySelector(".chord-subtitle");
        const category = fragment.querySelector(".category-pill");
        const fretboard = fragment.querySelector(".fretboard");
        const toneContainer = fragment.querySelector(".tone-list");
        const rootContainer = fragment.querySelector(".root-list");
        const nextContainer = fragment.querySelector(".next-list");
        const voicing = fragment.querySelector(".voicing");
        const emotionPanel = fragment.querySelector(".emotion-panel");

        card.dataset.name = chord.name;
        card.classList.toggle("is-featured", chord.name === featuredChord);
        title.textContent = displayChordName(chord.name);
        subtitle.textContent = chord.caption;
        category.textContent = CATEGORY_LABELS[chord.category];

        renderEmotion(emotionPanel, chord);
        renderFretboard(fretboard, chord);

        toneList(chord).forEach(({ note, degree }) => {
          const chip = document.createElement("span");
          chip.className = "tone-chip";
          // 刪除 degree，只留下 note
          chip.innerHTML = `<strong>${note}</strong>`; 
          toneContainer.appendChild(chip);
        });

        const roots = getRootPositions(chord);
        if (roots.length === 0) {
          const chip = document.createElement("span");
          chip.className = "root-chip";
          chip.textContent = "此指型沒有根音";
          rootContainer.appendChild(chip);
        } else {
          roots.forEach(({ stringIndex, fret }) => {
            const chip = document.createElement("span");
            chip.className = "root-chip";
            chip.textContent = `${STRING_NAMES[stringIndex]} ${fret === 0 ? "空弦" : `${fret}格`}`;
            rootContainer.appendChild(chip);
          });
        }

        chord.next.forEach((nextName) => {
          const chip = document.createElement("button");
          chip.className = "next-chip";
          chip.type = "button";
          chip.textContent = displayChordName(nextName);
          chip.addEventListener("click", () => jumpToChord(nextName));
          nextContainer.appendChild(chip);
        });

        const voicingText = chord.frets.map((fret) => (fret === null ? "x" : fret)).join(" ");
        voicing.innerHTML = `指型 <code>${voicingText}</code>`;

        return fragment;
      }

function currentResults() {
        const selectedRoot = rootSelect.value;
        const selectedQuality = qualitySelect.value;

        return chords.filter((chord) => {
          // 只比對下拉選單的根音與和弦類型
          const matchesRoot = selectedRoot === "all" || chord.root === selectedRoot;
          const matchesQuality = selectedQuality === "all" || chord.quality === selectedQuality;
          return matchesRoot && matchesQuality;
        });
      }

      function render() {
        const results = currentResults();
        chordGrid.innerHTML = "";

        if (results.length === 0) {
          chordGrid.innerHTML = `
            <div class="empty-state">
              <h2>找不到符合的和弦</h2>
              <p>目前的條件下沒有找到和弦，請嘗試調整根音或類型。</p>
            </div>
          `;
        } else {
          results.forEach((chord) => chordGrid.appendChild(renderCard(chord)));
        }

        // 單純顯示和弦數量
        resultCount.textContent = `顯示 ${results.length} 個和弦`;
      }

      function jumpToChord(name) {
        const target = chords.find((chord) => chord.name.toLowerCase() === name.toLowerCase());
        featuredChord = target?.name ?? "";
        if (target) {
          // 讓下拉選單自動切換至目標和弦的根音與類型
          rootSelect.value = target.root;
          qualitySelect.value = target.quality;
        }
        render();
        requestAnimationFrame(() => {
          const card = chordGrid.querySelector(".chord-card");
          card?.scrollIntoView({ behavior: "smooth", block: "nearest", inline: "start" });
        });
      }

      // 監聽下拉選單的變化
      rootSelect.addEventListener("change", () => {
        featuredChord = "";
        render();
      });

      qualitySelect.addEventListener("change", () => {
        featuredChord = "";
        render();
      });

      // 左右滑動按鈕功能
      function scrollByCard(direction) {
        const firstCard = chordGrid.querySelector(".chord-card");
        const distance = firstCard ? firstCard.getBoundingClientRect().width + 12 : 320;
        chordGrid.scrollBy({ left: distance * direction, behavior: "smooth" });
      }

      prevCard.addEventListener("click", () => scrollByCard(-1));
      nextCard.addEventListener("click", () => scrollByCard(1));

      // 手機版觸控滑動事件
      let isPointerDown = false;
      let startX = 0;
      let startScrollLeft = 0;

      chordGrid.addEventListener("pointerdown", (event) => {
        if (!matchMedia("(max-width: 720px)").matches) return;
        isPointerDown = true;
        startX = event.clientX;
        startScrollLeft = chordGrid.scrollLeft;
        chordGrid.classList.add("is-dragging");
        chordGrid.setPointerCapture(event.pointerId);
      });

      chordGrid.addEventListener("pointermove", (event) => {
        if (!isPointerDown) return;
        chordGrid.scrollLeft = startScrollLeft - (event.clientX - startX);
      });

      chordGrid.addEventListener("pointerup", () => {
        isPointerDown = false;
        chordGrid.classList.remove("is-dragging");
      });

      chordGrid.addEventListener("pointercancel", () => {
        isPointerDown = false;
        chordGrid.classList.remove("is-dragging");
      });

      // 初始渲染畫面
      render();
    </script>
  </body>
</html>
